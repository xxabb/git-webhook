# Deploy Example - Taskfile 示例模板
# 复制此文件并根据项目需求修改
# 任务链: 根据 webhookd.yaml 中的 tasks 配置执行

version: "3"

# 环境变量 (可选)
env:
  APP_NAME: myapp
  BUILD_DIR: ./bin

tasks:
  # 初始化任务 - 环境准备和依赖下载
  init:
    desc: 初始化环境和下载依赖
    cmds:
      - echo "正在初始化 {{.APP_NAME}}..."
      # Go 项目: go mod download && go mod verify
      # Node.js 项目: npm install
      # Python 项目: pip install -r requirements.txt
    silent: false

  # 测试任务 - 运行单元测试
  test:
    desc: 运行单元测试
    cmds:
      - echo "正在测试 {{.APP_NAME}}..."
      # Go 项目: go test ./... -v -race
      # Node.js 项目: npm test
      # Python 项目: pytest
    silent: false

  # 构建任务 - 编译二进制文件
  build:
    desc: 构建项目
    cmds:
      - echo "正在构建 {{.APP_NAME}}..."
      # Go 项目: CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o {{.BUILD_DIR}}/server ./cmd/server
      # Node.js 项目: npm run build
      # Python 项目: python -m py_compile
    silent: false

  # 运行任务 - 重启服务
  run:
    desc: 重启服务
    cmds:
      - echo "正在重启 {{.APP_NAME}}..."
      # cp {{.BUILD_DIR}}/server /opt/{{.APP_NAME}}/
      # systemctl restart {{.APP_NAME}}
      # systemctl status {{.APP_NAME}} --no-pager
    silent: false

  # 完整发布流程 (手动触发)
  publish:
    desc: 完整发布流程
    cmds:
      - echo "正在发布 {{.APP_NAME}}..."
      - task: init
      - task: test
      - task: build
      - task: run
    silent: false

  # 清理构建产物 (手动触发)
  clean:
    desc: 清理构建产物
    cmds:
      - echo "正在清理 {{.APP_NAME}}..."
      - rm -rf {{.BUILD_DIR}}/
      # Node.js 项目: rm -rf node_modules dist
      # Python 项目: rm -rf __pycache__ .pytest_cache
    silent: false
